name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Check out pinned database engine source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: shinyeonjun/rdb-memory-mcp
          ref: 35ed83de33e51eef74a5276c625cb03b24e020c4
          path: database-engine

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Verify product version
        shell: pwsh
        run: .\scripts\verify-product-version.ps1

      - name: Verify bundled-engine notices
        shell: pwsh
        run: .\scripts\verify-third-party-notices.ps1

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Check dead frontend code
        run: npm run deadcode

      - name: Test frontend
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Install pinned Rust toolchain
        shell: pwsh
        run: rustup toolchain install 1.96.1 --profile minimal --component clippy --component rustfmt --target x86_64-pc-windows-msvc

      - name: Verify locked dependency inventory
        shell: pwsh
        run: .\scripts\generate-dependency-inventory.ps1 -VerifyOnly

      - name: Build pinned database engine candidate
        run: cargo +1.96.1 build --locked --release -p database-memory-cli --manifest-path database-engine/Cargo.toml

      - name: Stage pinned database engine candidate
        shell: pwsh
        run: |
          $target = ".\src-tauri\engines\database-memory.exe"
          Copy-Item -LiteralPath ".\database-engine\target\release\database-memory.exe" -Destination $target -Force
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $target).Hash
          $manifestPath = ".\src-tauri\engines\manifest.json"
          $manifest = Get-Content -LiteralPath $manifestPath -Raw | ConvertFrom-Json
          $database = @($manifest.engines) | Where-Object id -eq "database-memory"
          if ($hash -ne $database.executable.sha256) {
            $database.developmentArtifacts = @([pscustomobject]@{ sha256 = $hash })
            $manifest | ConvertTo-Json -Depth 10 | Set-Content -LiteralPath $manifestPath -Encoding utf8
          }

      - name: Prepare pinned engines
        shell: pwsh
        run: |
          .\scripts\prepare-engines.ps1 -AllowDevelopmentArtifact
          .\scripts\prepare-engines.ps1 -VerifyOnly -AllowDevelopmentArtifact

      - name: Smoke code engine JSON contract
        shell: pwsh
        run: .\scripts\smoke-code-engine-contract.ps1

      - name: Smoke database engine metadata contract
        shell: pwsh
        run: .\scripts\smoke-rdb-productization.ps1 -DatabaseMemory .\src-tauri\engines\database-memory.exe

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Lint Rust
        run: cargo clippy --locked --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Test Rust
        run: cargo test --locked --manifest-path src-tauri/Cargo.toml

      - name: Test database adapter against the pinned sidecar
        run: cargo test --locked --manifest-path src-tauri/Cargo.toml workspace::tests::database_memory_v2_adapter_round_trip_is_complete_and_metadata_only -- --ignored --exact

      - name: Build internal release-mode desktop binary
        env:
          BACKEND_VISUAL_MAP_BUILD_SCOPE: internal
        run: npx tauri build --no-bundle
