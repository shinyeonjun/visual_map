name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Verify product version
        shell: pwsh
        run: .\scripts\verify-product-version.ps1

      - name: Verify bundled-engine notices
        shell: pwsh
        run: .\scripts\verify-third-party-notices.ps1

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Build frontend
        run: npm run build

      - name: Install pinned Rust toolchain
        shell: pwsh
        run: rustup toolchain install 1.96.1 --profile minimal --component clippy --component rustfmt --target x86_64-pc-windows-msvc

      - name: Verify locked dependency inventory
        shell: pwsh
        run: .\scripts\generate-dependency-inventory.ps1 -VerifyOnly

      - name: Prepare pinned release engines
        shell: pwsh
        run: |
          .\scripts\prepare-engines.ps1
          .\scripts\prepare-engines.ps1 -VerifyOnly

      - name: Smoke code engine JSON contract
        shell: pwsh
        run: .\scripts\smoke-code-engine-contract.ps1

      - name: Smoke database engine metadata contract
        shell: pwsh
        run: .\scripts\smoke-rdb-productization.ps1 -DatabaseMemory .\src-tauri\engines\database-memory.exe

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Lint Rust
        run: cargo clippy --locked --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Test Rust
        run: cargo test --locked --manifest-path src-tauri/Cargo.toml
